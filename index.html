    <hr>
    <h2>可換環推進委員会</h2>
    <hr>
    <h3>趣意書</h3>
    <p>
      非可換環の存在を認めてしまうことにより，次のような問題が起こってしまいます．
      <ul>
        <li>左（右）\(A\) 加群 \(M,N\) に対し，\(\operatorname{Hom}_{A}(M,N)\) は左（右）\(A\) 加群にはならない．</li>
        <li>\(A\)上の自由加群の基底の濃度は一定にならない．</li>
      </ul>
      しかし，はじめから可換環のみを考えていればこのような事態には陥りません．
    </p>
